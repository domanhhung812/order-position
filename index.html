<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Journal High-End</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #ffffff; 
            color: #000;
            -webkit-font-smoothing: antialiased;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* Custom Input Style */
        .input-minimal {
            border-bottom: 1px solid #e5e7eb;
            transition: border-color 0.2s;
        }
        .input-minimal:focus {
            border-color: #000;
            outline: none;
        }
        .tab-active {
            border-bottom: 2px solid #000;
            color: #000;
        }
    </style>
</head>
<body class="p-8 md:p-16">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-baseline mb-20">
            <div>
                <h1 class="text-3xl font-light tracking-tighter">ETH Journal</h1>
                <p class="text-gray-400 text-sm mt-2 font-medium tracking-wide uppercase">Track your positions</p>
            </div>
            <div class="text-right">
                <span class="text-[10px] text-gray-400 font-semibold uppercase tracking-[0.2em]">Binance Live</span>
                <p id="ethPrice" class="text-3xl font-light tracking-tighter mt-1">0.00</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-20">
            <div class="lg:col-span-4">
                <section class="space-y-12">
                    <div class="relative inline-block w-full">
                        <input type="file" id="imageInput" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="simulateImageUpload(this)">
                        <div class="border border-gray-100 py-3 text-center hover:bg-gray-50 transition-colors rounded-sm">
                            <span class="text-[10px] font-semibold uppercase tracking-widest text-gray-500">Scan Position</span>
                        </div>
                    </div>

                    <form id="tradeForm" onsubmit="saveTrade(event)" class="space-y-8">
                        <div class="flex flex-col">
                            <label class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest mb-2">Title</label>
                            <input type="text" id="tradeTitle" placeholder="Position name" class="input-minimal py-2 text-sm">
                        </div>

                        <div class="grid grid-cols-2 gap-8">
                            <div class="flex flex-col">
                                <label class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest mb-2">Side</label>
                                <select id="direction" class="input-minimal py-2 text-sm bg-transparent font-medium">
                                    <option value="MUA">BUY</option>
                                    <option value="BAN">SELL</option>
                                </select>
                            </div>
                            <div class="flex flex-col">
                                <label class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest mb-2">Size</label>
                                <input type="number" step="0.0001" id="volume" class="input-minimal py-2 text-sm">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-8">
                            <div class="flex flex-col">
                                <label class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest mb-2">Entry</label>
                                <input type="number" step="0.01" id="openPrice" class="input-minimal py-2 text-sm">
                            </div>
                            <div class="flex flex-col">
                                <label class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest mb-2">Take Profit</label>
                                <input type="number" step="0.01" id="takeProfit" class="input-minimal py-2 text-sm">
                            </div>
                        </div>

                        <div class="flex flex-col">
                            <label class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest mb-2">Opened Time</label>
                            <input type="datetime-local" id="openTime" step="1" required class="input-minimal py-2 text-sm font-medium">
                        </div>

                        <button type="submit" class="w-full bg-black text-white py-4 text-[10px] font-bold uppercase tracking-[0.2em] hover:opacity-80 transition-opacity">
                            Save Position
                        </button>
                    </form>
                </section>
            </div>

            <div class="lg:col-span-8">
                <div class="flex gap-8 mb-12 text-[10px] font-bold uppercase tracking-[0.2em] text-gray-400">
                    <button onclick="switchTab('OPEN')" id="tabOpen" class="pb-2 transition-all tab-active">
                        Active (<span id="countOpen">0</span>)
                    </button>
                    <button onclick="switchTab('CLOSED')" id="tabClosed" class="pb-2 transition-all">
                        Completed (<span id="countClosed">0</span>)
                    </button>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-[9px] uppercase tracking-[0.2em] text-gray-300 border-b border-gray-50">
                                <th class="pb-4 font-semibold">Label</th>
                                <th class="pb-4 font-semibold">Side</th>
                                <th class="pb-4 font-semibold text-right">Size</th>
                                <th class="pb-4 font-semibold text-right">Entry</th>
                                <th class="pb-4 font-semibold text-right" id="colLivePrice">Live</th>
                                <th class="pb-4 font-semibold text-right">Fee</th>
                                <th class="pb-4 font-semibold text-right">Net P&L</th>
                                <th class="pb-4"></th>
                            </tr>
                        </thead>
                        <tbody id="tradeTableBody" class="text-sm divide-y divide-gray-50"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentEthPrice = 0;
        let trades = JSON.parse(localStorage.getItem('ethTrades')) || [];
        let activeTab = 'OPEN';

        function connectWS() {
            const ws = new WebSocket('wss://fstream.binance.com/ws/ethusdt@ticker');
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.c) {
                    currentEthPrice = parseFloat(data.c);
                    document.getElementById('ethPrice').innerText = currentEthPrice.toLocaleString();
                    checkAutoClose();
                    renderTable();
                }
            };
            ws.onclose = () => setTimeout(connectWS, 2000);
        }
        connectWS();

        function checkAutoClose() {
            let changed = false;
            trades.forEach(t => {
                if (!t.closeTime && t.takeProfit > 0) {
                    const tp = parseFloat(t.takeProfit);
                    const isBuy = t.direction === 'MUA';
                    if ((isBuy && currentEthPrice >= tp) || (!isBuy && currentEthPrice <= tp)) {
                        t.closeTime = new Date().toISOString();
                        t.closePrice = tp; // Chốt tại giá TP
                        changed = true;
                    }
                }
            });
            if (changed) localStorage.setItem('ethTrades', JSON.stringify(trades));
        }

        async function simulateImageUpload(input) {
            let apiKey = localStorage.getItem('geminiApiKey');
            if (!apiKey) { apiKey = prompt("API Key:"); localStorage.setItem('geminiApiKey', apiKey); }
            const base64 = await new Promise(res => {
                const r = new FileReader(); r.onloadend = () => res(r.result.split(',')[1]); r.readAsDataURL(input.files[0]);
            });
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${apiKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [
                        {text: "OCR trade image. Rules: DD/MM/YY HH:MM:SS format. Numbers: no comma. JSON: {\"title\":\"\",\"direction\":\"MUA/BAN\",\"volume\":0,\"openPrice\":0,\"takeProfit\":0,\"openTime\":\"YYYY-MM-DDTHH:mm:ss\"}"},
                        {inlineData: {data: base64, mimeType: input.files[0].type}}
                    ]}]})
                });
                const json = await response.json();
                const d = JSON.parse(json.candidates[0].content.parts[0].text.replace(/```json/gi, '').replace(/```/g, '').trim());
                document.getElementById('tradeTitle').value = d.title;
                document.getElementById('direction').value = (d.direction === 'BUY' || d.direction === 'MUA') ? 'MUA' : 'BAN';
                document.getElementById('volume').value = String(d.volume).replace(/,/g, '');
                document.getElementById('openPrice').value = String(d.openPrice).replace(/,/g, '');
                document.getElementById('takeProfit').value = String(d.takeProfit).replace(/,/g, '');
                if (d.openTime) document.getElementById('openTime').value = d.openTime.replace("2016", "2026");
            } catch (e) { console.error(e); }
        }

        function calculateFee(openTimeStr, closeTimeStr) {
            const start = new Date(openTimeStr);
            start.setHours(0,0,0,0);
            const end = closeTimeStr ? new Date(closeTimeStr) : new Date();
            end.setHours(0,0,0,0);
            const diffDays = Math.round((end - start) / (1000*60*60*24));
            if (diffDays <= 0) return 0;
            let total = 0;
            for (let i = 0; i < diffDays; i++) {
                let d = new Date(start); d.setDate(start.getDate() + i);
                total += (d.getDay() === 5) ? 1.89 : 0.63;
            }
            return total;
        }

        function saveTrade(e) {
            e.preventDefault();
            trades.push({
                id: Date.now(),
                title: document.getElementById('tradeTitle').value || "New Position",
                direction: document.getElementById('direction').value,
                volume: document.getElementById('volume').value,
                openPrice: document.getElementById('openPrice').value,
                takeProfit: document.getElementById('takeProfit').value || 0,
                openTime: document.getElementById('openTime').value,
                closeTime: null,
                closePrice: null
            });
            localStorage.setItem('ethTrades', JSON.stringify(trades));
            renderTable(); e.target.reset();
        }

        function editTitle(id, newTitle) {
            const t = trades.find(x => x.id === id);
            if (t) { t.title = newTitle; localStorage.setItem('ethTrades', JSON.stringify(trades)); }
        }

        function switchTab(tab) {
            activeTab = tab;
            document.getElementById('tabOpen').className = tab === 'OPEN' ? 'pb-2 transition-all tab-active' : 'pb-2 transition-all';
            document.getElementById('tabClosed').className = tab === 'CLOSED' ? 'pb-2 transition-all tab-active' : 'pb-2 transition-all';
            document.getElementById('colLivePrice').innerText = tab === 'OPEN' ? 'Live' : 'Exit';
            renderTable();
        }

        function renderTable() {
            const body = document.getElementById('tradeTableBody');
            body.innerHTML = '';
            
            const openTrades = trades.filter(t => !t.closeTime).sort((a,b) => new Date(b.openTime) - new Date(a.openTime));
            const closedTrades = trades.filter(t => t.closeTime).sort((a,b) => new Date(b.closeTime) - new Date(a.closeTime));

            document.getElementById('countOpen').innerText = openTrades.length;
            document.getElementById('countClosed').innerText = closedTrades.length;

            const list = activeTab === 'OPEN' ? openTrades : closedTrades;

            list.forEach(t => {
                const openP = parseFloat(t.openPrice);
                const exitP = t.closeTime ? parseFloat(t.closePrice) : currentEthPrice;
                const fee = calculateFee(t.openTime, t.closeTime);
                const pnl = (t.direction === 'MUA' ? (exitP - openP) : (openP - exitP)) * parseFloat(t.volume);
                const net = pnl - fee;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="py-6">
                        <input type="text" value="${t.title}" onblur="editTitle(${t.id}, this.value)" 
                        class="bg-transparent border-none focus:outline-none focus:ring-0 w-full font-medium">
                    </td>
                    <td class="py-6 font-semibold text-[10px] tracking-widest ${t.direction === 'MUA' ? 'text-green-500' : 'text-red-500'}">
                        ${t.direction === 'MUA' ? 'BUY' : 'SELL'}
                    </td>
                    <td class="py-6 text-right text-gray-400 font-medium">${t.volume}</td>
                    <td class="py-6 text-right font-medium">$${openP.toLocaleString()}</td>
                    <td class="py-6 text-right font-medium">$${exitP.toLocaleString()}</td>
                    <td class="py-6 text-right text-red-400">-$${fee.toFixed(2)}</td>
                    <td class="py-6 text-right font-semibold ${net >= 0 ? 'text-green-600' : 'text-red-600'}">
                        ${net >= 0 ? '+' : ''}$${net.toLocaleString(undefined, {minimumFractionDigits: 2})}
                    </td>
                    <td class="py-6 text-right">
                        <button onclick="if(confirm('Delete?')){trades=trades.filter(x=>x.id!==${t.id});localStorage.setItem('ethTrades',JSON.stringify(trades));renderTable();}" class="opacity-10 hover:opacity-100 transition-opacity">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </td>
                `;
                body.appendChild(tr);
            });
        }
        renderTable();
    </script>
</body>
</html>
