<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Tracker - Simple Fix</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 font-sans">

    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center bg-white p-4 rounded-lg shadow-sm mb-6">
            <h1 class="text-xl font-bold text-gray-800">Nhật Ký Lệnh ETH</h1>
            <div class="text-right">
                <p class="text-xs text-gray-400 font-bold uppercase">Giá Live</p>
                <p id="ethPrice" class="text-xl font-bold text-blue-600">0.00</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="bg-white p-5 rounded-lg shadow-md lg:col-span-1">
                <input type="file" id="imageInput" accept="image/*" class="text-xs mb-4 w-full" onchange="simulateImageUpload(this)">
                <form id="tradeForm" onsubmit="saveTrade(event)" class="space-y-3">
                    <input type="text" id="tradeTitle" placeholder="Tiêu đề" class="w-full border p-2 rounded text-sm">
                    <div class="grid grid-cols-2 gap-2">
                        <select id="direction" class="border p-2 rounded text-sm font-bold">
                            <option value="MUA">MUA</option>
                            <option value="BAN">BÁN</option>
                        </select>
                        <input type="number" step="0.0001" id="volume" placeholder="Volume" required class="border p-2 rounded text-sm">
                    </div>
                    <input type="number" step="0.01" id="openPrice" placeholder="Giá mở" required class="border p-2 rounded text-sm w-full">
                    <input type="number" step="0.01" id="takeProfit" placeholder="Take Profit" class="border p-2 rounded text-sm w-full">
                    <label class="text-[10px] font-bold text-gray-400">THỜI GIAN VÀO LỆNH:</label>
                    <input type="datetime-local" id="openTime" required class="border p-2 rounded text-sm w-full">
                    <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded font-bold">LƯU LỆNH</button>
                </form>
            </div>

            <div class="bg-white p-4 rounded-lg shadow-md lg:col-span-3 overflow-x-auto">
                <table class="min-w-full text-sm">
                    <thead class="bg-gray-50 border-b text-gray-600">
                        <tr>
                            <th class="p-3">Tiêu đề</th>
                            <th class="p-3">Lệnh</th>
                            <th class="p-3">Volume</th>
                            <th class="p-3">Giá mở</th>
                            <th class="p-3 text-blue-600">Giá Live</th>
                            <th class="p-3 text-green-600">TP</th>
                            <th class="p-3 text-red-500">Phí qua đêm</th>
                            <th class="p-3 font-bold">Net Profit</th>
                            <th class="p-3"></th>
                        </tr>
                    </thead>
                    <tbody id="tradeTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let currentEthPrice = 0;
        let trades = JSON.parse(localStorage.getItem('ethTrades')) || [];

        // 1. WebSocket Giá Live
        function connectWS() {
            const ws = new WebSocket('wss://fstream.binance.com/ws/ethusdt@ticker');
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.c) {
                    currentEthPrice = parseFloat(data.c);
                    document.getElementById('ethPrice').innerText = `$${currentEthPrice.toFixed(2)}`;
                    renderTable();
                }
            };
            ws.onclose = () => setTimeout(connectWS, 2000);
        }
        connectWS();

        // 2. OCR AI (Gemini 3.1)
        async function simulateImageUpload(input) {
            let apiKey = localStorage.getItem('geminiApiKey');
            if (!apiKey) { apiKey = prompt("Nhập API Key:"); localStorage.setItem('geminiApiKey', apiKey); }
            const base64 = await new Promise(res => {
                const r = new FileReader(); r.onloadend = () => res(r.result.split(',')[1]); r.readAsDataURL(input.files[0]);
            });
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${apiKey}`;
            const response = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [
                    {text: "Đọc ảnh BingX trả về JSON raw (không markdown): {\"title\":\"\",\"direction\":\"MUA/BAN\",\"volume\":0,\"openPrice\":0,\"takeProfit\":0,\"openTime\":\"YYYY-MM-DDTHH:mm\"}"},
                    {inlineData: {data: base64, mimeType: input.files[0].type}}
                ]}]})
            });
            const json = await response.json();
            const d = JSON.parse(json.candidates[0].content.parts[0].text.replace(/```json/gi, '').replace(/```/g, '').trim());
            document.getElementById('tradeTitle').value = d.title || "BingX";
            document.getElementById('direction').value = d.direction || "MUA";
            document.getElementById('volume').value = String(d.volume).replace(/,/g, '');
            document.getElementById('openPrice').value = String(d.openPrice).replace(/,/g, '');
            document.getElementById('takeProfit').value = String(d.takeProfit).replace(/,/g, '');
            document.getElementById('openTime').value = d.openTime;
        }

        // 3. CÔNG THỨC TÍNH PHÍ SIÊU ĐƠN GIẢN
        function calculateFee(openTimeStr) {
            if (!openTimeStr) return 0;
            const openDate = new Date(openTimeStr);
            const now = new Date();
            
            // Tính số đêm (Số ngày chênh lệch)
            const diffMs = now.getTime() - openDate.getTime();
            const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            
            if (diffDays <= 0) return 0;

            // Tính số Thứ 6 nằm trong khoảng đó
            let fridays = 0;
            for (let i = 1; i <= diffDays; i++) {
                let check = new Date(openDate);
                check.setDate(openDate.getDate() + i);
                if (check.getDay() === 6) { // Nếu ngày mới là Thứ 7, nghĩa là vừa qua đêm Thứ 6
                    fridays++;
                }
            }

            // Phí = (Số ngày * 0.63) + (Số ngày Thứ 6 * 1.26)
            return (diffDays * 0.63) + (fridays * 1.26);
        }

        function saveTrade(e) {
            e.preventDefault();
            trades.push({
                id: Date.now(),
                title: document.getElementById('tradeTitle').value,
                direction: document.getElementById('direction').value,
                volume: document.getElementById('volume').value,
                openPrice: document.getElementById('openPrice').value,
                takeProfit: document.getElementById('takeProfit').value,
                openTime: document.getElementById('openTime').value
            });
            localStorage.setItem('ethTrades', JSON.stringify(trades));
            renderTable();
        }

        function deleteTrade(id) { trades = trades.filter(t => t.id !== id); localStorage.setItem('ethTrades', JSON.stringify(trades)); renderTable(); }

        function renderTable() {
            const body = document.getElementById('tradeTableBody');
            body.innerHTML = '';
            trades.forEach(t => {
                const openP = parseFloat(t.openPrice) || 0;
                const vol = parseFloat(t.volume) || 0;
                const fee = calculateFee(t.openTime);
                const pnl = (t.direction === 'MUA' ? (currentEthPrice - openP) : (openP - currentEthPrice)) * vol;
                const net = pnl - fee;

                body.innerHTML += `
                    <tr class="border-b text-center">
                        <td class="p-3">${t.title}</td>
                        <td class="p-3 font-bold ${t.direction==='MUA'?'text-green-600':'text-red-600'}">${t.direction}</td>
                        <td class="p-3">${vol}</td>
                        <td class="p-3">$${openP.toFixed(2)}</td>
                        <td class="p-3 text-blue-500 font-bold">$${currentEthPrice.toFixed(2)}</td>
                        <td class="p-3 text-green-500">$${t.takeProfit || '-'}</td>
                        <td class="p-3 text-red-400">-$${fee.toFixed(2)}</td>
                        <td class="p-3 font-bold ${net>=0?'text-green-600':'text-red-600'}">$${net.toFixed(2)}</td>
                        <td class="p-3"><button onclick="deleteTrade(${t.id})" class="text-gray-300">X</button></td>
                    </tr>`;
            });
        }
    </script>
</body>
</html>
