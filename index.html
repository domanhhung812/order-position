<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Tracker Pro - Fee Fixed</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="text-slate-800">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight underline decoration-blue-500 decoration-4">ETH Journal</h1>
                <p class="text-slate-500 font-medium">Phí qua đêm: 0.63$ | Thứ 6: 1.89$</p>
            </div>
            <div class="glass border border-slate-200 p-4 rounded-2xl shadow-sm flex items-center gap-6">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Binance Live</p>
                    <p id="ethPrice" class="text-2xl font-bold text-blue-600 tracking-tighter">$0.00</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white border border-slate-200 p-6 rounded-3xl shadow-sm">
                    <h3 class="text-lg font-bold mb-6 text-slate-700">✍️ Ghi nhận lệnh</h3>
                    
                    <div class="relative group mb-6">
                        <input type="file" id="imageInput" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="simulateImageUpload(this)">
                        <div class="border-2 border-dashed border-slate-200 group-hover:border-blue-400 bg-slate-50 py-4 rounded-xl text-center transition-all">
                            <span class="text-xs font-bold text-slate-400">TẢI ẢNH BINGX</span>
                        </div>
                    </div>

                    <form id="tradeForm" onsubmit="saveTrade(event)" class="space-y-4">
                        <input type="text" id="tradeTitle" placeholder="Tiêu đề (Tên khách/lệnh)" class="w-full bg-slate-50 ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-500 p-3 rounded-xl text-sm outline-none">
                        
                        <div class="grid grid-cols-2 gap-3">
                            <select id="direction" class="bg-slate-50 ring-1 ring-slate-200 p-3 rounded-xl text-sm font-bold outline-none uppercase">
                                <option value="MUA">MUA</option>
                                <option value="BAN">BÁN</option>
                            </select>
                            <input type="number" step="0.0001" id="volume" placeholder="Volume" required class="bg-slate-50 ring-1 ring-slate-200 p-3 rounded-xl text-sm outline-none">
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <input type="number" step="0.01" id="openPrice" placeholder="Giá vào" required class="bg-slate-50 ring-1 ring-slate-200 p-3 rounded-xl text-sm outline-none">
                            <input type="number" step="0.01" id="takeProfit" placeholder="TP" class="bg-slate-50 ring-1 ring-slate-200 p-3 rounded-xl text-sm outline-none">
                        </div>

                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Ngày giờ vào lệnh</label>
                            <input type="datetime-local" id="openTime" required class="w-full bg-slate-50 ring-1 ring-slate-200 p-3 rounded-xl text-sm outline-none font-medium">
                        </div>

                        <button type="submit" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold hover:bg-slate-900 transition-all shadow-lg active:scale-95">LƯU LỆNH</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest border-b border-slate-50 bg-slate-50/50">
                                    <th class="px-6 py-5">Chi tiết lệnh</th>
                                    <th class="px-4 py-5">Giá Mở</th>
                                    <th class="px-4 py-5">Giá Live</th>
                                    <th class="px-4 py-5 text-red-500 text-center">Phí</th>
                                    <th class="px-4 py-5">P&L Net</th>
                                    <th class="px-4 py-5 text-right"></th>
                                </tr>
                            </thead>
                            <tbody id="tradeTableBody" class="divide-y divide-slate-50 text-sm"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentEthPrice = 0;
        let trades = JSON.parse(localStorage.getItem('ethTrades')) || [];

        function connectWS() {
            const ws = new WebSocket('wss://fstream.binance.com/ws/ethusdt@ticker');
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.c) {
                    currentEthPrice = parseFloat(data.c);
                    document.getElementById('ethPrice').innerText = `$${currentEthPrice.toLocaleString()}`;
                    renderTable();
                }
            };
            ws.onclose = () => setTimeout(connectWS, 2000);
        }
        connectWS();

        async function simulateImageUpload(input) {
            let apiKey = localStorage.getItem('geminiApiKey');
            if (!apiKey) { apiKey = prompt("Nhập Gemini API Key:"); localStorage.setItem('geminiApiKey', apiKey); }
            const base64 = await new Promise(res => {
                const r = new FileReader(); r.onloadend = () => res(r.result.split(',')[1]); r.readAsDataURL(input.files[0]);
            });
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${apiKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [
                        {text: "Đọc ảnh lệnh BingX trả về JSON: {\"title\":\"\",\"direction\":\"MUA/BAN\",\"volume\":0,\"openPrice\":0,\"takeProfit\":0,\"openTime\":\"YYYY-MM-DDTHH:mm\"}"},
                        {inlineData: {data: base64, mimeType: input.files[0].type}}
                    ]}]})
                });
                const json = await response.json();
                const d = JSON.parse(json.candidates[0].content.parts[0].text.replace(/```json/gi, '').replace(/```/g, '').trim());
                document.getElementById('tradeTitle').value = d.title;
                document.getElementById('direction').value = d.direction;
                document.getElementById('volume').value = String(d.volume).replace(/,/g, '');
                document.getElementById('openPrice').value = String(d.openPrice).replace(/,/g, '');
                document.getElementById('takeProfit').value = String(d.takeProfit).replace(/,/g, '');
                document.getElementById('openTime').value = d.openTime;
            } catch (e) { console.error(e); }
        }

        // --- HÀM TÍNH PHÍ CHUẨN: TRÙNG NGÀY = 0 ---
        function calculateFee(openTimeStr) {
            if (!openTimeStr) return 0;
            
            const openDate = new Date(openTimeStr);
            openDate.setHours(0, 0, 0, 0); // Đưa về 00:00:00 của ngày mở
            
            const today = new Date();
            today.setHours(0, 0, 0, 0); // Đưa về 00:00:00 của ngày hôm nay

            // Nếu là cùng một ngày (today - openDate = 0)
            if (today.getTime() === openDate.getTime()) return 0;

            // Tính số đêm trôi qua
            const diffTime = today.getTime() - openDate.getTime();
            const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));
            
            let totalFee = 0;
            for (let i = 0; i < diffDays; i++) {
                let checkDate = new Date(openDate);
                checkDate.setDate(openDate.getDate() + i);
                
                // Nếu ngày đó là Thứ 6 -> tính x3 phí (1.89), ngày khác 0.63
                totalFee += (checkDate.getDay() === 5) ? 1.89 : 0.63;
            }
            return totalFee;
        }

        function saveTrade(e) {
            e.preventDefault();
            trades.push({
                id: Date.now(),
                title: document.getElementById('tradeTitle').value,
                direction: document.getElementById('direction').value,
                volume: document.getElementById('volume').value,
                openPrice: document.getElementById('openPrice').value,
                takeProfit: document.getElementById('takeProfit').value,
                openTime: document.getElementById('openTime').value
            });
            localStorage.setItem('ethTrades', JSON.stringify(trades));
            renderTable(); e.target.reset();
        }

        function deleteTrade(id) {
            if(confirm("Xóa lệnh?")) { trades = trades.filter(t => t.id !== id); localStorage.setItem('ethTrades', JSON.stringify(trades)); renderTable(); }
        }

        function renderTable() {
            const body = document.getElementById('tradeTableBody');
            body.innerHTML = '';
            trades.forEach(t => {
                const openP = parseFloat(t.openPrice) || 0;
                const vol = parseFloat(t.volume) || 0;
                const fee = calculateFee(t.openTime);
                const pnl = (t.direction === 'MUA' ? (currentEthPrice - openP) : (openP - currentEthPrice)) * vol;
                const net = pnl - fee;

                body.innerHTML += `
                    <tr class="hover:bg-slate-50/80 transition-all">
                        <td class="px-6 py-5">
                            <div class="font-bold text-slate-800">${t.title || 'N/A'}</div>
                            <div class="text-[9px] font-extrabold px-1.5 py-0.5 rounded w-fit ${t.direction==='MUA'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'} uppercase">
                                ${t.direction === 'MUA' ? 'Long' : 'Short'} • x${vol}
                            </div>
                        </td>
                        <td class="px-4 py-5 font-medium text-slate-400">$${openP.toLocaleString()}</td>
                        <td class="px-4 py-5 font-bold text-blue-500">$${currentEthPrice.toLocaleString()}</td>
                        <td class="px-4 py-5 text-center font-bold ${fee > 0 ? 'text-red-400' : 'text-slate-300'}">
                            ${fee > 0 ? '-$' + fee.toFixed(2) : '$0.00'}
                        </td>
                        <td class="px-4 py-5">
                            <div class="font-extrabold ${net>=0?'text-green-500':'text-red-500'}">
                                ${net >= 0 ? '+' : ''}$${net.toLocaleString(undefined, {minimumFractionDigits: 2})}
                            </div>
                            <div class="text-[9px] font-bold text-slate-300">TP: $${t.takeProfit || '-'}</div>
                        </td>
                        <td class="px-4 py-5 text-right">
                            <button onclick="deleteTrade(${t.id})" class="text-slate-200 hover:text-red-500 transition-colors">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </td>
                    </tr>`;
            });
        }
    </script>
</body>
</html>
