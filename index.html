<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Tracker Minimal</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #ffffff; 
            -webkit-font-smoothing: antialiased;
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .editable-title:focus {
            outline: none;
            border-bottom: 1px solid #000;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body class="text-black">

    <div class="max-w-6xl mx-auto px-6 py-12">
        <header class="flex justify-between items-end mb-16 border-b border-gray-100 pb-8">
            <div>
                <h1 class="text-2xl font-semibold tracking-tight">ETH Journal</h1>
                <p class="text-gray-400 text-sm mt-1">Track your positions</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-gray-400 uppercase tracking-widest font-semibold">Live Price</p>
                <p id="ethPrice" class="text-2xl font-light tracking-tighter">0.00</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
            <div class="lg:col-span-4">
                <div class="space-y-8">
                    <div class="relative group">
                        <input type="file" id="imageInput" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="simulateImageUpload(this)">
                        <div class="border border-gray-200 py-4 rounded-lg text-center group-hover:bg-gray-50 transition-all">
                            <span class="text-xs font-medium text-gray-500 uppercase tracking-wider">Scan BingX Image</span>
                        </div>
                    </div>

                    <form id="tradeForm" onsubmit="saveTrade(event)" class="space-y-5">
                        <div class="space-y-1">
                            <label class="text-[10px] uppercase tracking-wider text-gray-400 font-semibold">Title</label>
                            <input type="text" id="tradeTitle" placeholder="Position name" class="w-full border-b border-gray-200 py-2 text-sm outline-none focus:border-black transition-all">
                        </div>
                        
                        <div class="grid grid-cols-2 gap-6">
                            <div class="space-y-1">
                                <label class="text-[10px] uppercase tracking-wider text-gray-400 font-semibold">Side</label>
                                <select id="direction" class="w-full border-b border-gray-200 py-2 text-sm font-semibold outline-none bg-transparent">
                                    <option value="MUA">BUY</option>
                                    <option value="BAN">SELL</option>
                                </select>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] uppercase tracking-wider text-gray-400 font-semibold">Volume</label>
                                <input type="number" step="0.0001" id="volume" class="w-full border-b border-gray-200 py-2 text-sm outline-none focus:border-black">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-6">
                            <div class="space-y-1">
                                <label class="text-[10px] uppercase tracking-wider text-gray-400 font-semibold">Open Price</label>
                                <input type="number" step="0.01" id="openPrice" class="w-full border-b border-gray-200 py-2 text-sm outline-none focus:border-black">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] uppercase tracking-wider text-gray-400 font-semibold">Take Profit</label>
                                <input type="number" step="0.01" id="takeProfit" class="w-full border-b border-gray-200 py-2 text-sm outline-none focus:border-black">
                            </div>
                        </div>

                        <div class="space-y-1">
                            <label class="text-[10px] uppercase tracking-wider text-gray-400 font-semibold">Opened Time</label>
                            <input type="datetime-local" id="openTime" step="1" required class="w-full border-b border-gray-200 py-2 text-sm outline-none focus:border-black">
                        </div>

                        <button type="submit" class="w-full bg-black text-white py-4 rounded-lg text-xs font-bold uppercase tracking-widest hover:bg-gray-800 transition-all active:scale-[0.98]">
                            Save Position
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-gray-100">
                                <th class="py-4 text-[10px] uppercase tracking-widest text-gray-400 font-semibold">Title (Click to edit)</th>
                                <th class="py-4 text-[10px] uppercase tracking-widest text-gray-400 font-semibold">Side</th>
                                <th class="py-4 text-[10px] uppercase tracking-widest text-gray-400 font-semibold text-right">Size</th>
                                <th class="py-4 text-[10px] uppercase tracking-widest text-gray-400 font-semibold text-right">Entry</th>
                                <th class="py-4 text-[10px] uppercase tracking-widest text-gray-400 font-semibold text-right">Live</th>
                                <th class="py-4 text-[10px] uppercase tracking-widest text-gray-400 font-semibold text-right text-red-400">Fee</th>
                                <th class="py-4 text-[10px] uppercase tracking-widest text-gray-400 font-semibold text-right">Net P&L</th>
                                <th class="py-4"></th>
                            </tr>
                        </thead>
                        <tbody id="tradeTableBody" class="divide-y divide-gray-50"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentEthPrice = 0;
        let trades = JSON.parse(localStorage.getItem('ethTrades')) || [];

        function connectWS() {
            const ws = new WebSocket('wss://fstream.binance.com/ws/ethusdt@ticker');
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.c) {
                    currentEthPrice = parseFloat(data.c);
                    document.getElementById('ethPrice').innerText = currentEthPrice.toLocaleString();
                    renderTable();
                }
            };
            ws.onclose = () => setTimeout(connectWS, 2000);
        }
        connectWS();

        async function simulateImageUpload(input) {
            let apiKey = localStorage.getItem('geminiApiKey');
            if (!apiKey) { apiKey = prompt("Gemini API Key:"); localStorage.setItem('geminiApiKey', apiKey); }
            const base64 = await new Promise(res => {
                const r = new FileReader(); r.onloadend = () => res(r.result.split(',')[1]); r.readAsDataURL(input.files[0]);
            });

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${apiKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [
                        {text: "OCR trade image. Rule: DD/MM/YY HH:MM:SS. Year is last. Numbers: delete thousands comma. JSON: {\"title\":\"\",\"direction\":\"MUA/BAN\",\"volume\":0,\"openPrice\":0,\"takeProfit\":0,\"openTime\":\"YYYY-MM-DDTHH:mm:ss\"}"},
                        {inlineData: {data: base64, mimeType: input.files[0].type}}
                    ]}]})
                });
                const json = await response.json();
                const d = JSON.parse(json.candidates[0].content.parts[0].text.replace(/```json/gi, '').replace(/```/g, '').trim());
                
                const clean = (v) => v ? String(v).replace(/,/g, '') : "";
                document.getElementById('tradeTitle').value = d.title || "BingX Order";
                document.getElementById('direction').value = d.direction === "MUA" || d.direction === "BUY" ? "MUA" : "BAN";
                document.getElementById('volume').value = clean(d.volume);
                document.getElementById('openPrice').value = clean(d.openPrice);
                document.getElementById('takeProfit').value = clean(d.takeProfit);
                if (d.openTime) document.getElementById('openTime').value = d.openTime.replace("2016", "2026");
            } catch (e) { console.error(e); }
        }

        function calculateFee(openTimeStr) {
            if (!openTimeStr) return 0;
            const openDate = new Date(openTimeStr);
            openDate.setHours(0,0,0,0);
            const today = new Date();
            today.setHours(0,0,0,0);
            if (today.getTime() === openDate.getTime()) return 0;

            const diffDays = Math.round((today - openDate) / (1000*60*60*24));
            let total = 0;
            for (let i = 0; i < diffDays; i++) {
                let check = new Date(openDate);
                check.setDate(openDate.getDate() + i);
                total += (check.getDay() === 5) ? 1.89 : 0.63;
            }
            return total;
        }

        function saveTrade(e) {
            e.preventDefault();
            trades.push({
                id: Date.now(),
                title: document.getElementById('tradeTitle').value || "Unnamed",
                direction: document.getElementById('direction').value,
                volume: document.getElementById('volume').value,
                openPrice: document.getElementById('openPrice').value,
                takeProfit: document.getElementById('takeProfit').value,
                openTime: document.getElementById('openTime').value
            });
            localStorage.setItem('ethTrades', JSON.stringify(trades));
            renderTable(); e.target.reset();
        }

        function editTitle(id, newTitle) {
            const index = trades.findIndex(t => t.id === id);
            if (index !== -1) {
                trades[index].title = newTitle;
                localStorage.setItem('ethTrades', JSON.stringify(trades));
            }
        }

        function deleteTrade(id) {
            if(confirm("Delete?")) { trades = trades.filter(t => t.id !== id); localStorage.setItem('ethTrades', JSON.stringify(trades)); renderTable(); }
        }

        function renderTable() {
            const body = document.getElementById('tradeTableBody');
            body.innerHTML = '';
            trades.forEach(t => {
                const openP = parseFloat(t.openPrice) || 0;
                const vol = parseFloat(t.volume) || 0;
                const fee = calculateFee(t.openTime);
                const pnl = (t.direction === 'MUA' ? (currentEthPrice - openP) : (openP - currentEthPrice)) * vol;
                const net = pnl - fee;

                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition-all";
                tr.innerHTML = `
                    <td class="py-5">
                        <input type="text" value="${t.title}" 
                            onblur="editTitle(${t.id}, this.value)"
                            class="editable-title bg-transparent w-full text-sm font-medium border-b border-transparent">
                    </td>
                    <td class="py-5">
                        <span class="text-[10px] font-bold px-2 py-1 rounded ${t.direction==='MUA'?'bg-green-50 text-green-700':'bg-red-50 text-red-700'}">
                            ${t.direction === 'MUA' ? 'LONG' : 'SHORT'}
                        </span>
                    </td>
                    <td class="py-5 text-right font-medium text-gray-600">${vol}</td>
                    <td class="py-5 text-right text-gray-400">$${openP.toLocaleString()}</td>
                    <td class="py-5 text-right font-medium">$${currentEthPrice.toLocaleString()}</td>
                    <td class="py-5 text-right text-red-400">-$${fee.toFixed(2)}</td>
                    <td class="py-5 text-right font-bold ${net>=0?'text-green-600':'text-red-600'}">
                        ${net >= 0 ? '+' : ''}$${net.toLocaleString(undefined, {minimumFractionDigits: 2})}
                    </td>
                    <td class="py-5 text-right">
                        <button onclick="deleteTrade(${t.id})" class="text-gray-200 hover:text-black transition-colors ml-4">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </td>
                `;
                body.appendChild(tr);
            });
        }
        renderTable();
    </script>
</body>
</html>
