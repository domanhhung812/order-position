<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Tracker Pro - ETH</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 md:p-6 font-sans">

    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center bg-white p-4 rounded-lg shadow-sm mb-6 border-l-4 border-blue-600">
            <div>
                <h1 class="text-xl md:text-2xl font-bold text-gray-800">Nhật Ký ETH</h1>
                <p class="text-xs text-gray-500 uppercase tracking-widest">Binance Live | Gemini 3.1 AI</p>
            </div>
            <div class="text-right">
                <p class="text-xs text-gray-400">Giá ETH/USDT</p>
                <p id="ethPrice" class="text-xl md:text-2xl font-bold text-gray-400">Kết nối...</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="bg-white p-5 rounded-lg shadow-md lg:col-span-1 h-fit">
                <h2 class="text-lg font-bold mb-4 border-b pb-2">Lệnh Mới</h2>
                
                <div class="mb-4 p-4 border-2 border-dashed border-gray-300 rounded-lg text-center bg-gray-50 hover:border-blue-400 transition-colors">
                    <p class="text-[10px] text-gray-500 mb-2 font-bold uppercase">Quét ảnh BingX (Gemini 3.1)</p>
                    <input type="file" id="imageInput" accept="image/*" class="text-xs w-full" onchange="simulateImageUpload(this)">
                    <p id="uploadStatus" class="text-xs text-blue-500 mt-2 hidden italic font-bold">Đang soi ảnh...</p>
                </div>

                <form id="tradeForm" onsubmit="saveTrade(event)" class="space-y-3">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase">Tiêu đề</label>
                        <input type="text" id="tradeTitle" placeholder="Ví dụ: ETHUSD" class="w-full border p-2 rounded text-sm focus:ring-1 focus:ring-blue-500 outline-none">
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase">Chiều</label>
                            <select id="direction" class="w-full border p-2 rounded text-sm font-bold bg-white outline-none">
                                <option value="MUA" class="text-green-600">MUA (LONG)</option>
                                <option value="BAN" class="text-red-600">BÁN (SHORT)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase">Volume</label>
                            <input type="number" step="0.0001" id="volume" required class="w-full border p-2 rounded text-sm outline-none">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase">Giá mở cửa</label>
                        <input type="number" step="0.01" id="openPrice" required class="w-full border p-2 rounded text-sm outline-none">
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[10px] font-bold text-green-600 uppercase">Take Profit</label>
                            <input type="number" step="0.01" id="takeProfit" placeholder="N/A" class="w-full border p-2 rounded text-sm outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-red-600 uppercase">Stop Loss</label>
                            <input type="number" step="0.01" id="stopLoss" placeholder="N/A" class="w-full border p-2 rounded text-sm outline-none">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase">Thời gian mở (Rất quan trọng)</label>
                        <input type="datetime-local" id="openTime" required class="w-full border p-2 rounded text-sm outline-none">
                    </div>

                    <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 transition mt-4 shadow-lg shadow-blue-100">
                        LƯU LỆNH VÀO NHẬT KÝ
                    </button>
                </form>
            </div>

            <div class="bg-white p-4 md:p-6 rounded-lg shadow-md lg:col-span-3 flex flex-col">
                <div class="flex border-b mb-4 space-x-6">
                    <button id="btnTabOpen" onclick="switchTab('OPEN')" class="pb-2 font-bold text-blue-600 border-b-2 border-blue-600 transition-all">
                        Đang mở (<span id="countOpen">0</span>)
                    </button>
                    <button id="btnTabClosed" onclick="switchTab('CLOSED')" class="pb-2 font-bold text-gray-400 hover:text-gray-600 transition-all">
                        Hoàn thành (<span id="countClosed">0</span>)
                    </button>
                </div>

                <div class="overflow-x-auto">
                    <table class="min-w-full text-left text-sm">
                        <thead class="bg-gray-50 border-b">
                            <tr>
                                <th class="p-3 text-gray-600">Tiêu đề</th>
                                <th class="p-3 text-gray-600">Lệnh</th>
                                <th class="p-3 text-gray-600">Volume</th>
                                <th class="p-3 text-gray-600">Giá mở</th>
                                <th class="p-3 text-gray-600">Giá Live/Chốt</th>
                                <th class="p-3 text-red-500">Phí qua đêm</th>
                                <th class="p-3 text-blue-600">Net Profit</th>
                                <th class="p-3"></th>
                            </tr>
                        </thead>
                        <tbody id="tradeTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentEthPrice = 0;
        let trades = JSON.parse(localStorage.getItem('ethTrades')) || [];
        let currentTab = 'OPEN';

        // 1. WEBSOCKET BINANCE
        function connectWS() {
            const el = document.getElementById('ethPrice');
            const ws = new WebSocket('wss://fstream.binance.com/ws/ethusdt@ticker');
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.c) {
                    currentEthPrice = parseFloat(data.c);
                    el.innerText = `$${currentEthPrice.toFixed(2)}`;
                    el.className = "text-xl md:text-2xl font-bold text-green-500";
                    renderTable();
                }
            };
            ws.onclose = () => setTimeout(connectWS, 3000);
        }
        connectWS();

        // 2. AI QUÉT ẢNH (GEMINI 3.1)
        async function simulateImageUpload(input) {
            if (!input.files || !input.files[0]) return;
            const file = input.files[0];
            const status = document.getElementById('uploadStatus');
            let apiKey = localStorage.getItem('geminiApiKey');

            if (!apiKey) {
                apiKey = prompt("🤖 Nhập Gemini API Key mới của bạn:");
                if (!apiKey) return;
                localStorage.setItem('geminiApiKey', apiKey.trim());
            }

            status.innerText = "🤖 Gemini 3.1 đang đọc ảnh...";
            status.classList.remove('hidden', 'text-red-500');

            try {
                const base64 = await new Promise(res => {
                    const r = new FileReader(); r.onloadend = () => res(r.result.split(',')[1]); r.readAsDataURL(file);
                });

                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${apiKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                {text: "Đọc ảnh BingX và trả về JSON chuẩn: {\"title\":\"\",\"direction\":\"MUA/BAN\",\"volume\":0,\"openPrice\":0,\"takeProfit\":0,\"stopLoss\":0,\"openTime\":\"YYYY-MM-DDTHH:mm\"}"},
                                {inlineData: {data: base64, mimeType: file.type}}
                            ]
                        }]
                    })
                });

                const json = await response.json();
                if (json.error) throw new Error(json.error.message);

                let text = json.candidates[0].content.parts[0].text;
                text = text.replace(/```json/gi, '').replace(/```/g, '').trim();
                const d = JSON.parse(text);

                const clean = (v) => v ? String(v).replace(/,/g, '') : "";
                document.getElementById('tradeTitle').value = d.title || "ETHUSD";
                document.getElementById('direction').value = d.direction || "MUA";
                document.getElementById('volume').value = clean(d.volume);
                document.getElementById('openPrice').value = clean(d.openPrice);
                document.getElementById('takeProfit').value = clean(d.takeProfit);
                document.getElementById('stopLoss').value = clean(d.stopLoss);
                if (d.openTime) document.getElementById('openTime').value = d.openTime;

                status.innerText = "✅ Xong!";
                setTimeout(() => status.classList.add('hidden'), 2000);
            } catch (e) {
                status.innerText = "❌ " + e.message;
                status.classList.add('text-red-500');
                if (e.message.includes("404")) localStorage.removeItem('geminiApiKey');
            } finally { input.value = ""; }
        }

        // 3. TÍNH PHÍ QUA ĐÊM (FIX CHUẨN)
        function calculateTotalSwap(openTimeStr, closeTimeStr) {
            if (!openTimeStr) return 0;
            let start = new Date(openTimeStr);
            let end = closeTimeStr ? new Date(closeTimeStr) : new Date();
            
            // Chỉ tính nếu ngày đóng sau ngày mở
            let d1 = new Date(start.getFullYear(), start.getMonth(), start.getDate());
            let d2 = new Date(end.getFullYear(), end.getMonth(), end.getDate());
            
            let totalSwap = 0;
            const dailyFee = 0.63;
            let tempDate = new Date(d1);

            while (tempDate < d2) {
                // Đêm Thứ 6 sang Thứ 7 (getDay === 5) tính x3
                totalSwap += (tempDate.getDay() === 5) ? (dailyFee * 3) : dailyFee;
                tempDate.setDate(tempDate.getDate() + 1);
            }
            return totalSwap;
        }

        // 4. LOGIC LƯU VÀ HIỂN THỊ
        function saveTrade(e) {
            e.preventDefault();
            const trade = {
                id: Date.now(),
                title: document.getElementById('tradeTitle').value,
                direction: document.getElementById('direction').value,
                volume: document.getElementById('volume').value,
                openPrice: document.getElementById('openPrice').value,
                takeProfit: document.getElementById('takeProfit').value,
                stopLoss: document.getElementById('stopLoss').value,
                openTime: document.getElementById('openTime').value,
                closePrice: "", closeTime: ""
            };
            trades.push(trade);
            localStorage.setItem('ethTrades', JSON.stringify(trades));
            e.target.reset();
            renderTable();
        }

        function deleteTrade(id) {
            if (confirm("Xóa lệnh này khỏi nhật ký?")) {
                trades = trades.filter(t => t.id !== id);
                localStorage.setItem('ethTrades', JSON.stringify(trades));
                renderTable();
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('btnTabOpen').className = tab === 'OPEN' ? "pb-2 font-bold text-blue-600 border-b-2 border-blue-600" : "pb-2 font-bold text-gray-400";
            document.getElementById('btnTabClosed').className = tab === 'CLOSED' ? "pb-2 font-bold text-blue-600 border-b-2 border-blue-600" : "pb-2 font-bold text-gray-400";
            renderTable();
        }

        function renderTable() {
            const body = document.getElementById('tradeTableBody');
            body.innerHTML = '';
            const open = trades.filter(t => !t.closeTime);
            const closed = trades.filter(t => t.closeTime);
            document.getElementById('countOpen').innerText = open.length;
            document.getElementById('countClosed').innerText = closed.length;

            const list = currentTab === 'OPEN' ? open : closed;
            list.sort((a,b) => b.id - a.id).forEach(t => {
                const openP = parseFloat(t.openPrice) || 0;
                const exitP = t.closeTime ? (parseFloat(t.closePrice) || 0) : currentEthPrice;
                const vol = parseFloat(t.volume) || 0;
                
                const swap = calculateTotalSwap(t.openTime, t.closeTime);
                let pnl = (t.direction === 'MUA' ? (exitP - openP) : (openP - exitP)) * vol;
                const netProfit = pnl - swap;

                const tr = document.createElement('tr');
                tr.className = "border-b hover:bg-gray-50 transition-colors";
                tr.innerHTML = `
                    <td class="p-3 font-medium">${t.title || '-'}</td>
                    <td class="p-3 font-bold ${t.direction === 'MUA' ? 'text-green-600' : 'text-red-600'}">${t.direction}</td>
                    <td class="p-3 font-medium">${vol}</td>
                    <td class="p-3 text-gray-500">$${openP.toLocaleString()}</td>
                    <td class="p-3 font-bold ${t.closeTime ? 'text-gray-800' : 'text-blue-500'}">$${exitP.toLocaleString()}</td>
                    <td class="p-3 text-red-400 font-bold">-$${swap.toFixed(2)}</td>
                    <td class="p-3 font-bold ${netProfit >= 0 ? 'text-green-600' : 'text-red-600'}">
                        ${netProfit >= 0 ? '+' : ''}$${netProfit.toLocaleString(undefined, {minimumFractionDigits: 2})}
                    </td>
                    <td class="p-3 text-right">
                        <button onclick="deleteTrade(${t.id})" class="text-gray-300 hover:text-red-500 text-xl">&times;</button>
                    </td>
                `;
                body.appendChild(tr);
            });
        }
        renderTable();
    </script>
</body>
</html>
