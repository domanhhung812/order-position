<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Journal Cloud - Pure Firebase</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #000; -webkit-font-smoothing: antialiased; }
        .input-minimal { border-bottom: 1px solid #e5e7eb; transition: border-color 0.2s; background: transparent; }
        .input-minimal:focus { border-color: #000; outline: none; }
        .tab-active { border-bottom: 2px solid #000; color: #000; }
    </style>
</head>
<body class="p-8 md:p-16">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-baseline mb-20 border-b border-gray-50 pb-8">
            <div>
                <h1 class="text-3xl font-light tracking-tighter">ETH Cloud Journal</h1>
                <p class="text-gray-400 text-sm mt-2 font-medium tracking-wide uppercase">Track your positions</p>
            </div>
            <div class="text-right">
                <span class="text-[10px] text-gray-400 font-semibold uppercase tracking-[0.2em]">Binance Live</span>
                <p id="ethPrice" class="text-3xl font-light tracking-tighter mt-1">0.00</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-20">
            <div class="lg:col-span-4 space-y-12">
                <div class="relative inline-block w-full border border-gray-100 py-3 text-center rounded-sm">
                    <input type="file" id="imageInput" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="simulateImageUpload(this)">
                    <span class="text-[10px] font-semibold uppercase tracking-widest text-gray-500 font-bold">Scan BingX Position</span>
                </div>

                <form id="tradeForm" onsubmit="saveTrade(event)" class="space-y-8">
                    <div class="flex flex-col"><label class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest mb-2">Title</label><input type="text" id="tradeTitle" placeholder="Position name" class="input-minimal py-2 text-sm"></div>
                    <div class="grid grid-cols-2 gap-8">
                        <div class="flex flex-col"><label class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest mb-2">Side</label>
                        <select id="direction" class="input-minimal py-2 text-sm bg-transparent"><option value="MUA">BUY</option><option value="BAN">SELL</option></select></div>
                        <div class="flex flex-col"><label class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest mb-2">Size</label><input type="number" step="0.0001" id="volume" class="input-minimal py-2 text-sm"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-8">
                        <div class="flex flex-col"><label class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest mb-2">Entry</label><input type="number" step="0.01" id="openPrice" class="input-minimal py-2 text-sm"></div>
                        <div class="flex flex-col"><label class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest mb-2">Take Profit</label><input type="number" step="0.01" id="takeProfit" class="input-minimal py-2 text-sm"></div>
                    </div>
                    <div class="flex flex-col"><label class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest mb-2">Opened Time</label><input type="datetime-local" id="openTime" step="1" required class="input-minimal py-2 text-sm font-medium"></div>
                    <button type="submit" class="w-full bg-black text-white py-4 text-[10px] font-bold uppercase tracking-[0.2em] hover:opacity-80">Save to Cloud</button>
                </form>
            </div>

            <div class="lg:col-span-8">
                <div class="flex gap-8 mb-12 text-[10px] font-bold uppercase tracking-[0.2em] text-gray-400">
                    <button onclick="switchTab('OPEN')" id="tabOpen" class="pb-2 transition-all tab-active">Active (<span id="countOpen">0</span>)</button>
                    <button onclick="switchTab('CLOSED')" id="tabClosed" class="pb-2 transition-all">Completed (<span id="countClosed">0</span>)</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-[9px] uppercase tracking-[0.2em] text-gray-300 border-b border-gray-50">
                                <th class="pb-4">Label</th>
                                <th class="pb-4">Side</th>
                                <th class="pb-4 text-right">Size</th>
                                <th class="pb-4 text-right">Entry</th>
                                <th class="pb-4 text-right">Live/Exit</th>
                                <th class="pb-4 text-right">Fee</th>
                                <th class="pb-4 text-right font-bold text-gray-900">Net P&L</th>
                                <th class="pb-4"></th>
                            </tr>
                        </thead>
                        <tbody id="tradeTableBody" class="text-sm divide-y divide-gray-50"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CONFIG FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyB8enzjuvFgOSzq_FSu43KXp9q2uGA0wzg",
            authDomain: "eth-trading-812.firebaseapp.com",
            databaseURL: "https://eth-trading-812-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "eth-trading-812",
            storageBucket: "eth-trading-812.firebasestorage.app",
            messagingSenderId: "601538395832",
            appId: "1:601538395832:web:133937219cf7384b73be4d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- 2. CONFIG TELEGRAM ---
        const TG_TOKEN = ""; // Điền Token
        const TG_CHAT_ID = ""; // Điền ID

        let currentEthPrice = 0;
        let trades = [];
        let activeTab = 'OPEN';

        // Lấy dữ liệu từ Cloud (Không dùng LocalStorage)
        db.ref('trades').on('value', (snapshot) => {
            const data = snapshot.val();
            trades = data ? Object.values(data) : [];
            checkAutoClose();
            renderTable();
            checkDailyReport(); 
        });

        function connectWS() {
            const ws = new WebSocket('wss://fstream.binance.com/ws/ethusdt@ticker');
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.c) {
                    currentEthPrice = parseFloat(data.c);
                    document.getElementById('ethPrice').innerText = currentEthPrice.toLocaleString();
                    renderTable();
                }
            };
            ws.onclose = () => setTimeout(connectWS, 2000);
        }
        connectWS();

        function checkAutoClose() {
            trades.forEach(t => {
                if (!t.closeTime && t.takeProfit > 0) {
                    const tp = parseFloat(t.takeProfit);
                    const isBuy = t.direction === 'MUA';
                    if ((isBuy && currentEthPrice >= tp) || (!isBuy && currentEthPrice <= tp)) {
                        db.ref('trades/' + t.id).update({ closeTime: new Date().toISOString(), closePrice: tp });
                        sendTelegram(`✅ <b>Auto-Closed:</b> ${t.title} at $${tp}`);
                    }
                }
            });
        }

        async function sendTelegram(msg) {
            if (!TG_TOKEN || !TG_CHAT_ID) return;
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=HTML`);
        }

        // Báo cáo hàng ngày dùng Cloud để kiểm tra trạng thái
        function checkDailyReport() {
            const todayKey = new Date().toISOString().split('T')[0];
            db.ref('reports/' + todayKey).once('value', (snap) => {
                if (snap.exists()) return; // Đã báo cáo rồi

                const today = new Date().toLocaleDateString();
                const closedToday = trades.filter(t => t.closeTime && new Date(t.closeTime).toLocaleDateString() === today);
                
                if (closedToday.length > 0) {
                    let total = 0;
                    closedToday.forEach(t => {
                        const p = (t.direction === 'MUA' ? (t.closePrice - t.openPrice) : (t.openPrice - t.closePrice)) * t.volume;
                        total += p;
                    });
                    sendTelegram(`📊 <b>DAILY REPORT - ${today}</b>\n- Closed: ${closedToday.length}\n- Net P&L: <b>$${total.toFixed(2)}</b>`);
                    db.ref('reports/' + todayKey).set({ reported: true });
                }
            });
        }

        async function simulateImageUpload(input) {
            let key = localStorage.getItem('geminiApiKey'); // Chỉ giữ lại localStorage cho API Key bảo mật
            if (!key) { key = prompt("Nhập Gemini Key:"); localStorage.setItem('geminiApiKey', key); }
            const base64 = await new Promise(res => {
                const r = new FileReader(); r.onloadend = () => res(r.result.split(',')[1]); r.readAsDataURL(input.files[0]);
            });
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [
                        {text: "OCR trade image. Rule: DD/MM/YY format. Year is 2026. JSON: {\"title\":\"\",\"direction\":\"MUA/BAN\",\"volume\":0,\"openPrice\":0,\"takeProfit\":0,\"openTime\":\"YYYY-MM-DDTHH:mm:ss\"}"},
                        {inlineData: {data: base64, mimeType: input.files[0].type}}
                    ]}]})
                });
                const json = await response.json();
                const d = JSON.parse(json.candidates[0].content.parts[0].text.replace(/```json/gi, '').replace(/```/g, '').trim());
                document.getElementById('tradeTitle').value = d.title || "BingX Order";
                document.getElementById('direction').value = (d.direction === 'BUY' || d.direction === 'MUA') ? 'MUA' : 'BAN';
                document.getElementById('volume').value = String(d.volume).replace(/,/g, '');
                document.getElementById('openPrice').value = String(d.openPrice).replace(/,/g, '');
                document.getElementById('takeProfit').value = String(d.takeProfit).replace(/,/g, '');
                if (d.openTime) document.getElementById('openTime').value = d.openTime.replace("2016", "2026");
            } catch (e) { console.error(e); }
        }

        function calculateFee(openTimeStr, closeTimeStr) {
            const start = new Date(openTimeStr); start.setHours(0,0,0,0);
            const end = closeTimeStr ? new Date(closeTimeStr) : new Date(); end.setHours(0,0,0,0);
            const diffDays = Math.round((end - start) / (1000*60*60*24));
            if (diffDays <= 0) return 0;
            let total = 0;
            for (let i = 0; i < diffDays; i++) {
                let d = new Date(start); d.setDate(start.getDate() + i);
                total += (d.getDay() === 5) ? 1.89 : 0.63;
            }
            return total;
        }

        function saveTrade(e) {
            e.preventDefault();
            const id = Date.now();
            const newTrade = {
                id: id,
                title: document.getElementById('tradeTitle').value || "Unnamed",
                direction: document.getElementById('direction').value,
                volume: document.getElementById('volume').value,
                openPrice: document.getElementById('openPrice').value,
                takeProfit: document.getElementById('takeProfit').value || 0,
                openTime: document.getElementById('openTime').value,
                closeTime: null, closePrice: null
            };
            db.ref('trades/' + id).set(newTrade);
            sendTelegram(`📝 <b>New Entry:</b> ${newTrade.title} (${newTrade.direction})`);
            e.target.reset();
        }

        function switchTab(tab) {
            activeTab = tab;
            document.getElementById('tabOpen').className = tab === 'OPEN' ? 'pb-2 transition-all tab-active' : 'pb-2 transition-all';
            document.getElementById('tabClosed').className = tab === 'CLOSED' ? 'pb-2 transition-all tab-active' : 'pb-2 transition-all';
            renderTable();
        }

        function renderTable() {
            const body = document.getElementById('tradeTableBody');
            body.innerHTML = '';
            const openList = trades.filter(t => !t.closeTime).sort((a,b) => new Date(b.openTime) - new Date(a.openTime));
            const closedList = trades.filter(t => t.closeTime).sort((a,b) => new Date(b.closeTime) - new Date(a.closeTime));
            document.getElementById('countOpen').innerText = openList.length;
            document.getElementById('countClosed').innerText = closedList.length;

            const list = activeTab === 'OPEN' ? openList : closedList;
            list.forEach(t => {
                const openP = parseFloat(t.openPrice);
                const exitP = t.closeTime ? parseFloat(t.closePrice) : currentEthPrice;
                const fee = calculateFee(t.openTime, t.closeTime);
                const pnl = (t.direction === 'MUA' ? (exitP - openP) : (openP - exitP)) * parseFloat(t.volume);
                const net = pnl - fee;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="py-6"><input type="text" value="${t.title}" onblur="db.ref('trades/'+${t.id}).update({title:this.value})" class="bg-transparent border-none focus:outline-none w-full font-medium"></td>
                    <td class="py-6 font-semibold text-[10px] tracking-widest ${t.direction === 'MUA' ? 'text-green-500' : 'text-red-500'}">${t.direction === 'MUA' ? 'BUY' : 'SELL'}</td>
                    <td class="py-6 text-right font-medium text-gray-300">${t.volume}</td>
                    <td class="py-6 text-right font-medium text-gray-400">$${openP.toLocaleString()}</td>
                    <td class="py-6 text-right font-medium">$${exitP.toLocaleString()}</td>
                    <td class="py-6 text-right text-red-300">-$${fee.toFixed(2)}</td>
                    <td class="py-6 text-right font-bold ${net >= 0 ? 'text-green-600' : 'text-red-600'}">${net >= 0 ? '+' : ''}$${net.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                    <td class="py-6 text-right"><button onclick="if(confirm('Delete?')){db.ref('trades/'+${t.id}).remove();}" class="opacity-10 hover:opacity-100 transition-opacity">×</button></td>
                `;
                body.appendChild(tr);
            });
        }
    </script>
</body>
</html>
