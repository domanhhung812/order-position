<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETH Trading Tracker - Gemini 3.1 AI</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
</head>
<body class="bg-gray-100 p-4 md:p-6 font-sans">

    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center bg-white p-4 rounded-lg shadow-sm mb-6 border-l-4 border-blue-500">
            <div>
                <h1 class="text-xl md:text-2xl font-bold text-gray-800">Nhật Ký Giao Dịch ETH</h1>
                <p class="text-xs text-gray-500">WebSocket Binance Futures | Gemini 3.1 Flash Lite</p>
            </div>
            <div class="text-right">
                <p class="text-xs text-gray-400">Giá ETH Live (Binance)</p>
                <p id="ethPrice" class="text-xl md:text-2xl font-bold text-gray-400">Đang nối...</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="bg-white p-5 rounded-lg shadow-md lg:col-span-1 h-fit">
                <h2 class="text-lg font-bold mb-4 border-b pb-2">Lệnh Mới</h2>
                
                <div class="mb-4 p-4 border-2 border-dashed border-gray-300 rounded-lg text-center bg-gray-50">
                    <p class="text-xs text-gray-500 mb-2 font-medium">QUÉT ẢNH BINGX (AI 3.1)</p>
                    <input type="file" id="imageInput" accept="image/*" class="text-xs w-full" onchange="simulateImageUpload(this)">
                    <p id="uploadStatus" class="text-xs text-blue-500 mt-2 hidden italic font-medium">Đang phân tích...</p>
                </div>

                <form id="tradeForm" onsubmit="saveTrade(event)" class="space-y-3">
                    <div>
                        <label class="block text-xs font-bold text-gray-600 uppercase">Tiêu đề</label>
                        <input type="text" id="tradeTitle" placeholder="Tên lệnh..." class="w-full border p-2 rounded text-sm">
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs font-bold text-gray-600 uppercase">Chiều</label>
                            <select id="direction" class="w-full border p-2 rounded text-sm font-bold bg-white">
                                <option value="MUA" class="text-green-600 font-bold">MUA</option>
                                <option value="BAN" class="text-red-600 font-bold">BÁN</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-600 uppercase">Volume</label>
                            <input type="number" step="0.0001" id="volume" required class="w-full border p-2 rounded text-sm">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-600 uppercase">Giá mở</label>
                        <input type="number" step="0.01" id="openPrice" required class="w-full border p-2 rounded text-sm">
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs font-bold text-green-600 uppercase">TP</label>
                            <input type="number" step="0.01" id="takeProfit" placeholder="N/A" class="w-full border p-2 rounded text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-red-600 uppercase">SL</label>
                            <input type="number" step="0.01" id="stopLoss" placeholder="N/A" class="w-full border p-2 rounded text-sm">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-600 uppercase">Thời gian mở</label>
                        <input type="datetime-local" id="openTime" required class="w-full border p-2 rounded text-sm">
                    </div>

                    <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 transition mt-4 shadow-lg">
                        LƯU LỆNH
                    </button>
                </form>
            </div>

            <div class="bg-white p-4 md:p-6 rounded-lg shadow-md lg:col-span-3 flex flex-col">
                <div class="flex border-b mb-4">
                    <button id="btnTabOpen" onclick="switchTab('OPEN')" class="px-4 py-2 font-bold text-blue-600 border-b-2 border-blue-600">
                        Đang mở (<span id="countOpen">0</span>)
                    </button>
                    <button id="btnTabClosed" onclick="switchTab('CLOSED')" class="px-4 py-2 font-bold text-gray-400 hover:text-gray-600">
                        Hoàn thành (<span id="countClosed">0</span>)
                    </button>
                </div>

                <div class="overflow-x-auto overflow-y-auto max-h-[600px]">
                    <table class="min-w-full text-left text-sm">
                        <thead class="bg-gray-50 border-b sticky top-0">
                            <tr>
                                <th class="p-3">Tiêu đề</th>
                                <th class="p-3">Lệnh</th>
                                <th class="p-3">Volume</th>
                                <th class="p-3">Giá mở</th>
                                <th class="p-3">Giá Live/Chốt</th>
                                <th class="p-3 text-red-500">Tổng phí</th>
                                <th class="p-3 text-blue-600">Net Profit</th>
                                <th class="p-3 text-gray-400">TP/SL</th>
                                <th class="p-3"></th>
                            </tr>
                        </thead>
                        <tbody id="tradeTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentEthPrice = 0;
        let trades = JSON.parse(localStorage.getItem('ethTrades')) || [];
        let currentTab = 'OPEN'; 

        function formatInputDate(date) {
            const tzoffset = (new Date()).getTimezoneOffset() * 60000;
            return (new Date(date - tzoffset)).toISOString().slice(0, 16);
        }

        // --- 1. WEBSOCKET BINANCE FUTURES (GIÁ LIVE) ---
        function connectWebSocket() {
            const priceElement = document.getElementById('ethPrice');
            const ws = new WebSocket('wss://fstream.binance.com/ws/ethusdt@ticker');

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data && data.c) { 
                    currentEthPrice = parseFloat(data.c);
                    priceElement.innerText = `$${currentEthPrice.toFixed(2)}`;
                    priceElement.className = "text-xl md:text-2xl font-bold text-green-500 animate-pulse";
                    
                    if (!ws.lastR || Date.now() - ws.lastR > 1000) {
                        renderTable();
                        ws.lastR = Date.now();
                    }
                }
            };
            ws.onclose = () => setTimeout(connectWebSocket, 3000);
        }
        connectWebSocket();

        // --- 2. AI QUÉT ẢNH (GEMINI 3.1 FLASH LITE) ---
        async function simulateImageUpload(input) {
            if (!input.files || !input.files[0]) return;
            const file = input.files[0];
            const status = document.getElementById('uploadStatus');
            let apiKey = localStorage.getItem('geminiApiKey');

            if (!apiKey) {
                apiKey = prompt("🤖 Dán Gemini API Key mới (vừa tạo ở AI Studio):");
                if (!apiKey) return;
                localStorage.setItem('geminiApiKey', apiKey.trim());
            }

            status.innerText = "🤖 Gemini 3.1 đang phân tích...";
            status.classList.remove('hidden', 'text-red-500');
            status.classList.add('text-blue-500');

            try {
                const base64Data = await new Promise((res) => {
                    const reader = new FileReader();
                    reader.onloadend = () => res(reader.result.split(',')[1]);
                    reader.readAsDataURL(file);
                });

                // Dùng model 3.1 Flash Lite mới nhất theo giao diện của bạn
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${apiKey}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Bạn là OCR tài chính. Đọc ảnh BingX và trả về JSON raw: {\"title\":\"\",\"direction\":\"MUA/BAN\",\"volume\":0,\"openPrice\":0,\"takeProfit\":0,\"stopLoss\":0,\"openTime\":\"YYYY-MM-DDTHH:mm\"}" },
                                { inlineData: { data: base64Data, mimeType: file.type } }
                            ]
                        }]
                    })
                });

                const json = await response.json();
                if (json.error) throw new Error(json.error.message);

                let rawText = json.candidates[0].content.parts[0].text;
                rawText = rawText.replace(/```json/gi, '').replace(/```/g, '').trim();
                const d = JSON.parse(rawText);

                const cleanNum = (val) => val ? String(val).replace(/,/g, '') : "";

                document.getElementById('tradeTitle').value = d.title || "Lệnh từ ảnh";
                document.getElementById('direction').value = d.direction || "MUA";
                document.getElementById('volume').value = cleanNum(d.volume);
                document.getElementById('openPrice').value = cleanNum(d.openPrice);
                document.getElementById('takeProfit').value = cleanNum(d.takeProfit);
                document.getElementById('stopLoss').value = cleanNum(d.stopLoss);
                if (d.openTime) document.getElementById('openTime').value = d.openTime;

                status.innerText = "✅ Thành công!";
                status.classList.replace('text-blue-500', 'text-green-500');
                setTimeout(() => status.classList.add('hidden'), 3000);
            } catch (e) {
                status.innerText = "❌ Lỗi: " + e.message;
                status.classList.replace('text-blue-500', 'text-red-500');
                if (e.message.includes("404") || e.message.includes("API_KEY")) localStorage.removeItem('geminiApiKey');
            } finally { input.value = ""; }
        }

        // --- 3. LOGIC TÍNH PHÍ & LỢI NHUẬN ---
        function calculateTotalSwap(openTimeStr, closeTimeStr) {
            if (!openTimeStr) return 0;
            let start = new Date(openTimeStr);
            let end = closeTimeStr ? new Date(closeTimeStr) : new Date();
            
            let current = new Date(start); current.setHours(0,0,0,0);
            let stop = new Date(end); stop.setHours(0,0,0,0);
            
            let totalSwap = 0;
            const dailyFee = 0.63;
            while (current < stop) {
                totalSwap += (current.getDay() === 5) ? (dailyFee * 3) : dailyFee;
                current.setDate(current.getDate() + 1);
            }
            return totalSwap;
        }

        function saveTrade(e) {
            e.preventDefault();
            const trade = {
                id: Date.now(),
                title: document.getElementById('tradeTitle').value,
                direction: document.getElementById('direction').value,
                volume: document.getElementById('volume').value,
                openPrice: document.getElementById('openPrice').value,
                takeProfit: document.getElementById('takeProfit').value,
                stopLoss: document.getElementById('stopLoss').value,
                openTime: document.getElementById('openTime').value,
                closePrice: "",
                closeTime: ""
            };
            trades.push(trade);
            localStorage.setItem('ethTrades', JSON.stringify(trades));
            e.target.reset(); renderTable();
        }

        function deleteTrade(id) {
            if(confirm("Xóa lệnh này?")) {
                trades = trades.filter(t => t.id !== id);
                localStorage.setItem('ethTrades', JSON.stringify(trades));
                renderTable();
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('btnTabOpen').className = tab === 'OPEN' ? "px-4 py-2 font-bold text-blue-600 border-b-2 border-blue-600" : "px-4 py-2 font-bold text-gray-400";
            document.getElementById('btnTabClosed').className = tab === 'CLOSED' ? "px-4 py-2 font-bold text-blue-600 border-b-2 border-blue-600" : "px-4 py-2 font-bold text-gray-400";
            renderTable();
        }

        function renderTable() {
            const body = document.getElementById('tradeTableBody');
            body.innerHTML = '';
            const open = trades.filter(t => !t.closeTime);
            const closed = trades.filter(t => t.closeTime);
            document.getElementById('countOpen').innerText = open.length;
            document.getElementById('countClosed').innerText = closed.length;

            const list = currentTab === 'OPEN' ? open : closed;
            list.sort((a,b) => b.id - a.id).forEach(t => {
                const openP = parseFloat(t.openPrice) || 0;
                const exitP = t.closeTime ? (parseFloat(t.closePrice) || 0) : currentEthPrice;
                const vol = parseFloat(t.volume) || 0;
                
                const totalSwap = calculateTotalSwap(t.openTime, t.closeTime);
                let pnl = (t.direction === 'MUA' ? (exitP - openP) : (openP - exitP)) * vol;
                const netProfit = pnl - totalSwap;

                const tr = document.createElement('tr');
                tr.className = "border-b hover:bg-gray-50 transition";
                tr.innerHTML = `
                    <td class="p-3 font-medium">${t.title || '-'}</td>
                    <td class="p-3 font-bold ${t.direction === 'MUA' ? 'text-green-600' : 'text-red-600'}">${t.direction}</td>
                    <td class="p-3">${vol}</td>
                    <td class="p-3">$${openP.toFixed(2)}</td>
                    <td class="p-3 font-bold ${t.closeTime ? '' : 'text-blue-500'}">$${exitP.toFixed(2)}</td>
                    <td class="p-3 text-red-400 font-medium">-$${totalSwap.toFixed(2)}</td>
                    <td class="p-3 font-bold ${netProfit >= 0 ? 'text-green-600' : 'text-red-600'}">
                        ${netProfit >= 0 ? '+' : ''}$${netProfit.toFixed(2)}
                    </td>
                    <td class="p-3 text-[10px] text-gray-400">TP: ${t.takeProfit || '-'}<br>SL: ${t.stopLoss || '-'}</td>
                    <td class="p-3"><button onclick="deleteTrade(${t.id})" class="text-red-300 hover:text-red-600">&times;</button></td>
                `;
                body.appendChild(tr);
            });
        }
        renderTable();
    </script>
</body>
</html>
