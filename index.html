<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETH Live Trade Tracker PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6 font-sans">

    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center bg-white p-4 rounded-lg shadow-md mb-6 border-l-4 border-blue-500">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Nhật Ký Giao Dịch ETH</h1>
                <p class="text-sm text-gray-500">Tự động chốt lệnh khi chạm TP/SL (Check 1p/lần)</p>
            </div>
            <div class="text-right">
                <p class="text-sm text-gray-500">Giá ETH (BingX)</p>
                <p id="ethPrice" class="text-2xl font-bold text-green-600">Đang tải...</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="bg-white p-6 rounded-lg shadow-md lg:col-span-1 h-fit">
                <h2 class="text-lg font-bold mb-4 border-b pb-2">Thêm Lệnh Mới</h2>
                
                <div class="mb-4 p-4 border-2 border-dashed border-gray-300 rounded-lg text-center bg-gray-50">
                    <p class="text-sm text-gray-500 mb-2">Tải ảnh lên để tự động điền</p>
                    <input type="file" id="imageInput" accept="image/*" class="text-sm w-full" onchange="simulateImageUpload(this)">
                    <p id="uploadStatus" class="text-xs text-blue-500 mt-2 hidden">Đang đọc dữ liệu...</p>
                </div>

                <form id="tradeForm" onsubmit="saveTrade(event)">
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <div>
                            <label class="block text-sm font-medium">Chiều</label>
                            <select id="direction" class="w-full border p-2 rounded bg-gray-50">
                                <option value="MUA">MUA</option>
                                <option value="BAN">BÁN</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium">Volume</label>
                            <input type="number" step="0.01" id="volume" required class="w-full border p-2 rounded">
                        </div>
                    </div>

                    <div class="mb-2">
                        <label class="block text-sm font-medium">Giá mở</label>
                        <input type="number" step="0.01" id="openPrice" required class="w-full border p-2 rounded">
                    </div>

                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <div>
                            <label class="block text-sm font-medium text-green-600">Take Profit (TP)</label>
                            <input type="number" step="0.01" id="takeProfit" class="w-full border p-2 rounded placeholder-gray-300" placeholder="Tùy chọn">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-red-600">Stop Loss (SL)</label>
                            <input type="number" step="0.01" id="stopLoss" class="w-full border p-2 rounded placeholder-gray-300" placeholder="Tùy chọn">
                        </div>
                    </div>

                    <div class="mb-2">
                        <label class="block text-sm font-medium">Thời gian mở</label>
                        <input type="datetime-local" id="openTime" required class="w-full border p-2 rounded">
                    </div>
                    
                    <hr class="my-3">

                    <div class="mb-2">
                        <label class="block text-sm font-medium text-gray-700">Giá đóng <span class="text-xs font-normal">(Bỏ trống = Đang mở)</span></label>
                        <input type="number" step="0.01" id="closePrice" class="w-full border p-2 rounded bg-gray-50">
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700">Thời gian đóng</label>
                        <input type="datetime-local" id="closeTime" class="w-full border p-2 rounded bg-gray-50">
                    </div>

                    <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded font-bold hover:bg-blue-700 transition">Lưu Lệnh</button>
                </form>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-md lg:col-span-3 overflow-hidden flex flex-col">
                <div class="flex border-b mb-4">
                    <button id="btnTabOpen" onclick="switchTab('OPEN')" class="px-6 py-3 font-semibold text-blue-600 border-b-2 border-blue-600 focus:outline-none transition-colors">
                        Đang mở (<span id="countOpen">0</span>)
                    </button>
                    <button id="btnTabClosed" onclick="switchTab('CLOSED')" class="px-6 py-3 font-semibold text-gray-500 hover:text-gray-700 focus:outline-none transition-colors">
                        Hoàn thành (<span id="countClosed">0</span>)
                    </button>
                </div>

                <div class="overflow-x-auto flex-1">
                    <table class="min-w-full text-left text-sm whitespace-nowrap">
                        <thead class="bg-gray-100 border-b">
                            <tr>
                                <th class="p-3">Chiều</th>
                                <th class="p-3">Vol</th>
                                <th class="p-3">Giá mở</th>
                                <th class="p-3 text-green-600">TP</th>
                                <th class="p-3 text-red-600">SL</th>
                                <th class="p-3">Giá <span id="thPriceType">Live</span></th>
                                <th class="p-3">Thời gian</th>
                                <th class="p-3 text-orange-500">Phí Swap</th>
                                <th class="p-3 text-blue-600">Net Profit</th>
                                <th class="p-3"></th>
                            </tr>
                        </thead>
                        <tbody id="tradeTableBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentEthPrice = 0;
        let trades = JSON.parse(localStorage.getItem('ethTrades')) || [];
        let currentTab = 'OPEN'; 

        function formatInputDate(date) {
            // Định dạng ngày theo giờ local chuẩn cho input type datetime-local (YYYY-MM-DDTHH:mm)
            const tzoffset = (new Date()).getTimezoneOffset() * 60000;
            return (new Date(date - tzoffset)).toISOString().slice(0, 16);
        }

        // --- 1. LẤY GIÁ & CẬP NHẬT GIAO DIỆN ---
        async function fetchETHPrice() {
            try {
                // Dùng API Binance vì họ hỗ trợ tốt cho Web (Không bị lỗi CORS như BingX)
                const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=ETHUSDT');
                const data = await response.json();
                
                if (data && data.price) {
                    currentEthPrice = parseFloat(data.price);
                    document.getElementById('ethPrice').innerText = `$${currentEthPrice.toFixed(2)}`;
                    checkTPSL(currentEthPrice); // Gọi logic check TP/SL 
                }
            } catch (error) {
                console.error("Lỗi tải giá:", error);
                document.getElementById('ethPrice').innerText = "Lỗi mạng!";
            }
            renderTable();
        }

        // --- 2. HÀM TỰ ĐỘNG KIỂM TRA TP/SL ---
        function checkTPSL(livePrice) {
            let hasUpdated = false;

            trades.forEach(trade => {
                // Chỉ xét những lệnh đang mở (chưa có thời gian đóng)
                if (!trade.closeTime) {
                    let tp = parseFloat(trade.takeProfit);
                    let sl = parseFloat(trade.stopLoss);
                    let isHit = false;
                    let hitPrice = 0;
                    let reason = "";

                    // Kiểm tra lệnh MUA (Long)
                    if (trade.direction === 'MUA') {
                        if (tp && livePrice >= tp) { isHit = true; hitPrice = tp; reason = "Take Profit"; }
                        else if (sl && livePrice <= sl) { isHit = true; hitPrice = sl; reason = "Stop Loss"; }
                    } 
                    // Kiểm tra lệnh BÁN (Short)
                    else if (trade.direction === 'BAN') {
                        if (tp && livePrice <= tp) { isHit = true; hitPrice = tp; reason = "Take Profit"; }
                        else if (sl && livePrice >= sl) { isHit = true; hitPrice = sl; reason = "Stop Loss"; }
                    }

                    // Nếu chạm TP hoặc SL
                    if (isHit) {
                        trade.closePrice = hitPrice.toString(); // Chốt ở đúng giá TP hoặc SL
                        trade.closeTime = formatInputDate(new Date()); // Ghi nhận thời gian hiện tại
                        hasUpdated = true;
                        
                        // Thông báo ra màn hình
                        alert(`🚀 Lệnh ${trade.direction} ${trade.volume} ETH đã tự động khớp [${reason}] tại giá $${hitPrice}! Đã chuyển sang tab Hoàn thành.`);
                    }
                }
            });

            // Nếu có lệnh thay đổi trạng thái thì lưu đè vào Local Storage
            if (hasUpdated) {
                localStorage.setItem('ethTrades', JSON.stringify(trades));
                // Reload lại bảng nếu đang ở tab Open để nhìn lệnh biến mất (chạy sang tab Closed)
                renderTable(); 
            }
        }

        // --- 3. TÍNH TOÁN PHÍ SWAP ($0.63/ngày) ---
        function calculateSwapFee(openTimeStr, closeTimeStr) {
            let start = new Date(openTimeStr);
            let end = closeTimeStr ? new Date(closeTimeStr) : new Date(); 
            let swapFee = 0;

            let current = new Date(start);
            current.setHours(0,0,0,0);
            let endDay = new Date(end);
            endDay.setHours(0,0,0,0);

            while(current < endDay) {
                if(current.getDay() === 5) { // Thứ 6 nhân 3 phí swap
                    swapFee += (0.63 * 3);
                } else {
                    swapFee += 0.63; // Đã đổi thành 0.63$ theo yêu cầu
                }
                current.setDate(current.getDate() + 1);
            }
            return swapFee;
        }

        // --- 4. GIAO DIỆN TABS ---
        function switchTab(tab) {
            currentTab = tab;
            
            const btnOpen = document.getElementById('btnTabOpen');
            const btnClosed = document.getElementById('btnTabClosed');
            
            if(tab === 'OPEN') {
                btnOpen.className = "px-6 py-3 font-semibold text-blue-600 border-b-2 border-blue-600 focus:outline-none transition-colors";
                btnClosed.className = "px-6 py-3 font-semibold text-gray-500 hover:text-gray-700 focus:outline-none transition-colors";
                document.getElementById('thPriceType').innerText = "Live";
            } else {
                btnClosed.className = "px-6 py-3 font-semibold text-blue-600 border-b-2 border-blue-600 focus:outline-none transition-colors";
                btnOpen.className = "px-6 py-3 font-semibold text-gray-500 hover:text-gray-700 focus:outline-none transition-colors";
                document.getElementById('thPriceType').innerText = "Chốt";
            }
            
            renderTable();
        }

        // --- 5. LƯU & XÓA LỆNH ---
        function saveTrade(e) {
            e.preventDefault();
            const closeTimeVal = document.getElementById('closeTime').value;
            const closePriceVal = document.getElementById('closePrice').value;
            
            const trade = {
                id: Date.now(),
                direction: document.getElementById('direction').value,
                volume: document.getElementById('volume').value,
                openPrice: document.getElementById('openPrice').value,
                takeProfit: document.getElementById('takeProfit').value,
                stopLoss: document.getElementById('stopLoss').value,
                openTime: document.getElementById('openTime').value,
                closePrice: (closePriceVal && closeTimeVal) ? closePriceVal : "",
                closeTime: (closePriceVal && closeTimeVal) ? closeTimeVal : "",
            };

            trades.push(trade);
            localStorage.setItem('ethTrades', JSON.stringify(trades));
            
            if (trade.closeTime) switchTab('CLOSED');
            else renderTable();
            
            e.target.reset();
        }

        function deleteTrade(id) {
            if(confirm("Bạn có chắc muốn xóa lệnh này?")) {
                trades = trades.filter(t => t.id !== id);
                localStorage.setItem('ethTrades', JSON.stringify(trades));
                renderTable();
            }
        }

        // --- 6. RENDER BẢNG THEO TAB ---
        function renderTable() {
            const tbody = document.getElementById('tradeTableBody');
            tbody.innerHTML = '';
            
            const openTrades = trades.filter(t => !t.closeTime);
            const closedTrades = trades.filter(t => t.closeTime);
            
            document.getElementById('countOpen').innerText = openTrades.length;
            document.getElementById('countClosed').innerText = closedTrades.length;

            let displayTrades = currentTab === 'OPEN' ? openTrades : closedTrades;
            displayTrades.sort((a, b) => b.id - a.id);

            if (displayTrades.length === 0) {
                tbody.innerHTML = `<tr><td colspan="10" class="p-6 text-center text-gray-400 italic">Không có lệnh nào ở đây.</td></tr>`;
                return;
            }

            displayTrades.forEach(trade => {
                const tr = document.createElement('tr');
                const isClosed = trade.closeTime ? true : false;
                tr.className = `border-b hover:bg-gray-50 ${isClosed ? 'bg-gray-50' : 'bg-white'}`;

                let swapFee = calculateSwapFee(trade.openTime, trade.closeTime);
                let swapDisplay = swapFee === 0 ? "$0.00" : `-$${swapFee.toFixed(2)}`;

                let exitPrice = isClosed ? parseFloat(trade.closePrice) : currentEthPrice;
                let openPrice = parseFloat(trade.openPrice);
                let vol = parseFloat(trade.volume);
                
                let grossProfit = 0;
                if (exitPrice > 0) {
                    if (trade.direction === 'MUA') {
                        grossProfit = (exitPrice - openPrice) * vol;
                    } else { 
                        grossProfit = (openPrice - exitPrice) * vol;
                    }
                }

                let netProfit = grossProfit - swapFee;
                let netClass = netProfit >= 0 ? "text-green-600 font-bold" : "text-red-600 font-bold";
                let netSign = netProfit > 0 ? "+" : "";

                let priceDisplay = isClosed 
                    ? `$${parseFloat(trade.closePrice).toFixed(2)}` 
                    : `<span class="text-blue-500 animate-pulse">$${exitPrice.toFixed(2)}</span>`;
                
                let timeDisplay = isClosed 
                    ? `<div><span class="text-xs text-gray-400">M: </span>${trade.openTime.replace('T', ' ')}</div>
                       <div><span class="text-xs text-gray-400">Đ: </span>${trade.closeTime.replace('T', ' ')}</div>` 
                    : `${trade.openTime.replace('T', ' ')}`;

                tr.innerHTML = `
                    <td class="p-3 font-bold ${trade.direction === 'MUA' ? 'text-green-600' : 'text-red-600'}">
                        ${trade.direction}
                    </td>
                    <td class="p-3">${trade.volume}</td>
                    <td class="p-3">$${openPrice.toFixed(2)}</td>
                    <td class="p-3 text-green-600">${trade.takeProfit ? '$'+trade.takeProfit : '-'}</td>
                    <td class="p-3 text-red-600">${trade.stopLoss ? '$'+trade.stopLoss : '-'}</td>
                    <td class="p-3 font-medium">${priceDisplay}</td>
                    <td class="p-3 text-xs text-gray-600">${timeDisplay}</td>
                    <td class="p-3 text-orange-500 font-medium">${swapDisplay}</td>
                    <td class="p-3 ${netClass} text-base bg-gray-50/50">${netSign}$${netProfit.toFixed(2)}</td>
                    <td class="p-3"><button onclick="deleteTrade(${trade.id})" class="text-gray-400 hover:text-red-500 text-xl">&times;</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // --- 7. GIẢ LẬP ĐỌC ẢNH ---
        function simulateImageUpload(input) {
            if(input.files && input.files[0]) {
                const status = document.getElementById('uploadStatus');
                status.classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('direction').value = "MUA";
                    document.getElementById('volume').value = "1";
                    document.getElementById('openPrice').value = "1986.08";
                    
                    // SỬA THEO CHUẨN TRONG ẢNH GỐC
                    document.getElementById('takeProfit').value = "2280.00"; 
                    
                    document.getElementById('openTime').value = "2026-03-03T23:08";
                    
                    status.innerText = "Đã điền dữ liệu thành công!";
                    setTimeout(() => status.classList.add('hidden'), 3000);
                }, 1000);
            }
        }
    </script>
</body>
</html>
